<!DOCTYPE html>
<html>

<head>
    <title>CI/CD Release Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

    <header>

        <h1>🚀 CI/CD Release Dashboard</h1>

        <p>
            Automated Deployment Demo Application
        </p>

    </header>


    <section class="card">

        <h2>Application Information</h2>

        <div class="info">

            <p>
                <strong>Application:</strong>
                Employee Portal
            </p>


            <p>
                <strong>Version:</strong>
                1.0.0
            </p>


            <p>
                <strong>Environment:</strong>
                <span class="env">
                    LOCAL
                </span>
            </p>


            <p>
                <strong>Status:</strong>

                <span class="success">
                    RUNNING
                </span>

            </p>


        </div>

    </section>



    <section class="card">


        <h2>Pipeline Flow</h2>


        <div class="pipeline">


            <div class="stage completed">
                Git Commit
            </div>


            <div class="arrow">
                →
            </div>


            <div class="stage completed">
                Jenkins Build
            </div>


            <div class="arrow">
                →
            </div>


            <div class="stage completed">
                Docker Image
            </div>


            <div class="arrow">
                →
            </div>


            <div class="stage pending">
                Deployment
            </div>


        </div>


    </section>



    <button onclick="checkDeployment()">
        Verify Deployment
    </button>


    <p id="message"></p>


</div>


<script src="script.js"></script>

</body>

</html>
